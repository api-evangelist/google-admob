aid: google-admob
name: Google AdMob
description: >-
  The Google AdMob API provides programmatic access to information about AdMob
  accounts, allowing publishers to retrieve details about ad sources, ad units,
  apps, and mediation groups, and to generate campaign, mediation, and network
  reports for mobile app monetization.
